<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন পোর্টাল</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; }
        .light-mode { --bg: #f8fafc; --card: #ffffff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; transition: 0.3s; }
        .box { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; }
        button { background: var(--accent); color: white; cursor: pointer; transition: 0.3s; }
        .progress-container { width: 100%; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        #progressBar { height: 100%; width: 0%; background: var(--accent); transition: 0.3s; }
        li { background: rgba(255,255,255,0.05); padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h2 id="title">সামির হোসেন</h2>
        <input type="email" id="email" placeholder="ইমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button onclick="auth('login')">লগইন</button>
        <button onclick="googleLogin()" style="background: #db4437;">Google দিয়ে লগইন</button>
        <button onclick="forgot()" style="background:none; border:1px solid #6366f1">পাসওয়ার্ড রিসেট</button>
    </div>

    <div class="box hidden" id="dashBox">
        <img id="profilePic" style="width:60px; border-radius:50%; margin-bottom:10px;">
        <h2 id="welcomeText">ড্যাশবোর্ড</h2>
        <button onclick="toggleTheme()">থিম পরিবর্তন</button>
        <input type="file" id="fileInput">
        <div class="progress-container"><div id="progressBar"></div></div>
        <button onclick="uploadFile()">আপলোড ফাইল</button>
        <input type="text" id="searchBox" placeholder="🔍 ফাইল খুঁজুন..." onkeyup="filterFiles()">
        <ul id="files"></ul>
        <textarea id="notes" placeholder="ছোট নোট লিখুন..." onchange="saveNotes()"></textarea>
        <button onclick="location.reload()" style="background: #ef4444;">লগআউট</button>
    </div>

    <script>
        const firebaseConfig = { /* আপনার কনফিগ আগের মতোই থাকবে */ };
        firebase.initializeApp(firebaseConfig);

        // ১. থিম সেভার (LocalStorage)
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        // ২. নোটস সেভার
        function saveNotes() { localStorage.setItem('myNotes', document.getElementById('notes').value); }
        document.getElementById('notes').value = localStorage.getItem('myNotes') || "";

        // ৩. গুগল লগইন ও প্রোফাইল পিকচার
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((res) => {
                document.getElementById('profilePic').src = res.user.photoURL;
                showDashboard(res.user.email);
            });
        }

        // ৪. ফাইল আপলোড উইথ প্রোগ্রেস (স্ট্রাকচার)
        async function uploadFile() {
            document.getElementById('progressBar').style.width = "50%"; // সিমুলেটেড প্রোগ্রেস
            // আপনার আগের আপলোড লজিক এখানে বসবে
            alert("ফাইল আপলোড হচ্ছে...");
        }

        // ৫. ডিলিট বাটন যোগ করা (লোড ফাংশনের ভেতর)
        async function loadFiles() {
            // আপনার ফাইল লোড হওয়ার পর প্রতিটি লিস্ট আইটেমে এটি যোগ করবেন:
            // `<li>${f.filename} <button onclick="deleteFile('${f.filename}')">❌</button></li>`
        }

        function filterFiles() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('#files li').forEach(li => {
                li.style.display = li.textContent.toLowerCase().includes(q) ? "" : "none";
            });
        }

        function showDashboard(email) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('dashBox').classList.remove('hidden');
            document.getElementById('welcomeText').innerText = "স্বাগতম, " + email;
        }

        // অন্যান্য ফাংশনগুলো আগের মতোই থাকবে...
        async function auth(type) { /* লগইন/রেজিস্টার কোড */ }
        async function forgot() { /* পাসওয়ার্ড রিসেট কোড */ }
    </script>
</body>
</html>
