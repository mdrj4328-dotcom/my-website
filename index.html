<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সামির হোসেন পোর্টাল</title>
    <script src="https://cdn.faceio.net/fio.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 100%; max-width: 400px; background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; outline: none; }
        button { background: #6366f1; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #4f46e5; }
        .toggle-text { cursor: pointer; font-size: 13px; color: #818cf8; margin-top: 10px; }
        .hidden { display: none; }
        /* FaceIO বাটন স্টাইল */
        #faceio-enroll, #faceio-authenticate { background: #4f46e5; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box" id="authBox">
        <h2 id="title">লগইন</h2>
        <input type="email" id="email" placeholder="ইমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button id="mainBtn" onclick="handleAuth()">লগইন</button>
        <p class="toggle-text" id="toggleText" onclick="toggleMode()">নতুন একাউন্ট খুলতে ক্লিক করুন</p>
        <p class="toggle-text" onclick="forgot()">পাসওয়ার্ড ভুলে গেছেন?</p>
        
        <button id="faceio-authenticate" onclick="authenticateUser()">Face ID দিয়ে লগইন করুন</button>
        <button id="faceio-enroll" onclick="enrollNewUser()" class="hidden">আপনার মুখ রেজিস্টার করুন</button>
    </div>

    <script>
        let isLogin = true;
        
        // FaceIO আপনার অ্যাপ আইডি (এটি আপনাকে FaceIO ড্যাশবোর্ড থেকে নিয়ে এখানে বসাতে হবে)
        const faceio = new faceIO("fioa96db"); // 'fioa96db' এর জায়গায় আপনার ID দিন

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "লগইন" : "নতুন একাউন্ট";
            document.getElementById('mainBtn').innerText = isLogin ? "লগইন" : "রেজিস্ট্রেশন করুন";
            document.getElementById('toggleText').innerText = isLogin ? "নতুন একাউন্ট খুলতে ক্লিক করুন" : "লগইন করতে ক্লিক করুন";
            
            // ফেস রেজিস্টার/লগইন বাটন শো/হাইড
            document.getElementById('faceio-authenticate').classList.toggle('hidden', !isLogin);
            document.getElementById('faceio-enroll').classList.toggle('hidden', isLogin);
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/api/login' : '/api/register';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const data = await res.json();
                alert(data.message || data.error);
                if(res.ok && isLogin) {
                    alert("লগইন সফল!");
                    // লগইন সফল হলে ড্যাশবোর্ডে রিডাইরেক্ট কোড এখানে
                }
            } catch (error) {
                console.error("অথেন্টিকেশন এরর:", error);
                alert("সার্ভার সমস্যা, পরে চেষ্টা করুন।");
            }
        }

        async function forgot() {
            const email = document.getElementById('email').value;
            if(!email) return alert("ইমেইল দিন!");
            const res = await fetch('/api/forgot', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            alert(data.message || data.error);
        }

        // FaceIO: নতুন ইউজার রেজিস্টার ফাংশন
        async function enrollNewUser() {
            const email = document.getElementById('email').value;
            if(!email) return alert("প্রথমে আপনার ইমেইল দিন!");
            
            try {
                const userInfo = await faceio.enroll({
                    "locale": "auto", 
                    "payload": {
                        "email": email
                    }
                });
                alert("ফেস রেজিস্টার সফল! ফেস আইডি: " + userInfo.facialId);
            } catch (error) {
                handleFaceIOError(error);
            }
        }

        // FaceIO: ইউজার অথেন্টিকেট ফাংশন
        async function authenticateUser() {
            try {
                const response = await faceio.authenticate({
                    "locale": "auto"
                });
                
                // ফেস আইডি দিয়ে সার্ভারে লগইন রিকোয়েস্ট পাঠানো
                const res = await fetch('/api/face-login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({facialId: response.facialId})
                });
                
                const data = await res.json();
                alert(data.message || data.error);
                if(res.ok) {
                    alert("ফেস আইডি দিয়ে লগইন সফল!");
                    // লগইন সফল হলে ড্যাশবোর্ডে রিডাইরেক্ট কোড এখানে
                }
            } catch (error) {
                handleFaceIOError(error);
            }
        }

        function handleFaceIOError(err) {
            console.error("FaceIO এরর:", err);
            // FaceIO নির্দিষ্ট এরর কোড হ্যান্ডলিং
            switch (err.code) {
                case fioErrCode.PERMISSION_REFUSED:
                    alert("ক্যামেরা পারমিশন পাওয়া যায়নি।");
                    break;
                case fioErrCode.SESSION_EXPIRED:
                    alert("সেশন শেষ, আবার চেষ্টা করুন।");
                    break;
                case fioErrCode.EMPTY_DATA:
                    alert("ক্যামেরার সামনে কেউ নেই।");
                    break;
                default:
                    alert("ফেস ভেরিফিকেশনে সমস্যা, সাধারণ লগইন ব্যবহার করুন।");
                    break;
            }
        }
    </script>
</body>
</html>
