<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন পোর্টাল</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; }
        button { background: #6366f1; color: white; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container" id="loginBox">
        <h2>সামির হোসেন পোর্টাল</h2>
        <input type="email" id="email" placeholder="ইমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button onclick="login()">লগইন (ফেস ভেরিফাই)</button>
        <p onclick="forgot()" style="cursor:pointer; font-size:12px;">পাসওয়ার্ড ভুলে গেছেন?</p>
    </div>

    <div class="container hidden" id="dashboard">
        <h2>স্বাগতম, সামির হোসেন!</h2>
        <button onclick="alert('আপলোড সিস্টেম সচল')">ফাইল আপলোড</button>
        <button onclick="location.reload()" style="background:#ef4444;">লগ আউট</button>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            alert("ক্যামেরা অন হচ্ছে...");
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            if(res.ok) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else alert("ভুল তথ্য!");
        }

        async function forgot() {
            const email = document.getElementById('email').value;
            const res = await fetch('/api/forgot', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            alert(data.message || data.error);
        }
    </script>
</body>
</html>
