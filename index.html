<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন - আলটিমেট মিডিয়া পোর্টাল</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --success: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .wrapper { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
        /* স্টোরেজ মিটার */
        .meter { height: 10px; background: #334; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .fill { height: 100%; background: var(--success); width: 30%; }
        /* ড্র্যাগ-ড্রপ */
        .drop-zone { border: 2px dashed var(--accent); padding: 40px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        /* গ্যালারি */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .item { background: #334155; padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2 style="text-align:center;">সামির হোসেন</h2>
    
    <div id="dashboard">
        <div class="meter"><div class="fill"></div></div>
        <p style="font-size: 12px;">স্টোরেজ: ৩০% ব্যবহৃত (আনলিমিটেড স্পেস)</p>

        <div class="drop-zone" id="drop-zone">ফাইল এখানে ড্রপ করুন</div>
        <input type="file" id="file-input" class="hidden">

        <div class="grid" id="media-grid">
            <div class="item">🖼️ ছবি.jpg <br> <button>🔗</button> ⭐</div>
            <div class="item">🎥 ভিডিও.mp4 <br> <button>🔗</button> ⭐</div>
            <div class="item">🎵 অডিও.mp3 <br> <button>🔗</button> ⭐</div>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = "#2d3748"; };
    dropZone.ondragleave = () => dropZone.style.background = "transparent";
    dropZone.ondrop = (e) => { e.preventDefault(); alert("ফাইল আপলোড হচ্ছে..."); };
</script>

</body>
</html>
