<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন - আলটিমেট মিডিয়া পোর্টাল</title>
    <style>
        :root { --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b); --card-bg: rgba(255, 255, 255, 0.08); --accent-color: #6366f1; }
        body { background: var(--bg-gradient); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: sans-serif; }
        .wrapper { width: 100%; max-width: 450px; background: var(--card-bg); padding: 35px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.15); }
        .hidden { display: none; }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; }
        button { background: var(--accent-color); color: white; font-weight: bold; cursor: pointer; }
        .link-text { text-align: center; font-size: 13px; color: #a5b4fc; cursor: pointer; margin-top: 10px; }
        .drop-zone { border: 2px dashed var(--accent-color); padding: 30px; text-align: center; cursor: pointer; border-radius: 12px; margin: 20px 0; background: rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body>
<div class="wrapper">
    <!-- অথেনটিকেশন বক্স -->
    <div id="auth-box">
        <h2 id="auth-title" style="text-align:center;">লগইন করুন</h2>
        <input type="text" id="username" placeholder="ইউজারনেম (শুধু রেজিস্ট্রেশনের জন্য)">
        <input type="email" id="email" placeholder="জিমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button id="auth-btn" onclick="submitAuth()">লগইন করুন</button>
        
        <div class="link-text" id="toggle-link" onclick="toggleAuth()">নতুন অ্যাকাউন্ট তৈরি করুন</div>
        <div class="link-text" id="forgot-link" onclick="forgotPassword()">পাসওয়ার্ড ভুলে গেছেন?</div>
    </div>

    <!-- ড্যাশবোর্ড বক্স -->
    <div id="dashboard-box" class="hidden">
        <h3>ক্লাউড স্টোরেজ (আনলিমিটেড)</h3>
        <div style="height:8px; background:#334; border-radius:4px; margin:15px 0;">
            <div style="width:10%; height:100%; background:#10b981;"></div>
        </div>
        <div class="drop-zone" id="drop-zone">ফাইল টেনে আনুন অথবা ক্লিক করুন</div>
        <input type="file" id="file-input" style="display:none">
        <button onclick="logout()" style="background:#ef4444; margin-top:20px;">লগআউট</button>
    </div>
</div>

<script>
    let isLogin = true;
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "লগইন করুন" : "রেজিস্ট্রেশন করুন";
        document.getElementById('auth-btn').innerText = isLogin ? "লগইন করুন" : "রেজিস্ট্রেশন করুন";
        document.getElementById('toggle-link').innerText = isLogin ? "নতুন অ্যাকাউন্ট তৈরি করুন" : "লগইন পেজে ফিরে যান";
    }

    function forgotPassword() {
        alert("আপনার জিমেইলে পাসওয়ার্ড রিসেট লিংক পাঠানো হয়েছে!");
    }

    async function submitAuth() {
        // এখানে আপনার সার্ভার কল হবে
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('dashboard-box').classList.remove('hidden');
    }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => alert("আপলোড হচ্ছে: " + e.target.files[0].name);
    
    function logout() { location.reload(); }
</script>
</body>
</html>
