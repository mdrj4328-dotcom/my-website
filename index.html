<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন পোর্টাল</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; }
        button { background: #6366f1; color: white; cursor: pointer; }
        .hidden { display: none; }
        ul { text-align: left; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h2>সামির হোসেন</h2>
        <input type="email" id="email" placeholder="ইমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button onclick="auth('login')">লগইন</button>
        <button onclick="auth('register')">নতুন একাউন্ট</button>
        <button onclick="forgot()">পাসওয়ার্ড ভুলে গেছেন?</button>
    </div>

    <div class="box hidden" id="dashBox">
        <h2>ড্যাশবোর্ড - সামির হোসেন</h2>
        
        <div id="stats" style="margin-bottom: 20px; font-size: 14px;">
            <p>আপনার ড্যাশবোর্ড লোড হচ্ছে...</p>
        </div>

        <input type="file" id="fileInput">
        <select id="category">
            <option value="image">ছবি</option>
            <option value="video">ভিডিও</option>
            <option value="audio">অডিও</option>
        </select>
        <button onclick="uploadFile()">আপলোড ফাইল</button>

        <div id="fileList" style="margin: 20px 0; border-top: 1px solid #475569; padding-top: 10px;">
            <h4>আপনার ফাইলসমূহ:</h4>
            <ul id="files"></ul>
        </div>

        <hr>
        <input type="password" id="oldPass" placeholder="পুরানো পাসওয়ার্ড">
        <input type="password" id="newPass" placeholder="নতুন পাসওয়ার্ড">
        <button onclick="changePass()" style="background: #ef4444;">পাসওয়ার্ড পরিবর্তন</button>
        
        <button onclick="location.reload()" style="background: #475569;">লগআউট</button>
    </div>

    <script>
        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password, type})
            });
            const data = await res.json();
            alert(data.message || data.error);
            if(data.success) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('dashBox').classList.remove('hidden');
                loadFiles(); // লগইন হলে ফাইল লোড হবে
            }
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const category = document.getElementById('category').value;
            const email = document.getElementById('email').value;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('category', category);
            formData.append('email', email);

            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message);
            loadFiles();
        }

        async function loadFiles() {
            const email = document.getElementById('email').value;
            const res = await fetch('/api/files', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            const list = document.getElementById('files');
            list.innerHTML = "";
            data.files.forEach(f => {
                list.innerHTML += `<li>${f.filename} (${f.category})</li>`;
            });
        }

        async function changePass() {
            const email = document.getElementById('email').value;
            const oldPassword = document.getElementById('oldPass').value;
            const newPassword = document.getElementById('newPass').value;
            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, oldPassword, newPassword})
            });
            const data = await res.json();
            alert(data.message || data.error);
        }

        async function forgot() {
            const email = document.getElementById('email').value;
            const res = await fetch('/api/forgot', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            alert(data.message || data.error);
        }
    </script>
</body>
</html>
