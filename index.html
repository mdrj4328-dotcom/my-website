<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন পোর্টাল</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; }
        .light-mode { --bg: #f8fafc; --card: #ffffff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; transition: 0.3s; }
        .box { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input, button, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        button { background: var(--accent); color: white; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .hidden { display: none; }
        ul { text-align: left; margin-top: 10px; list-style: none; padding: 0; }
        li { background: rgba(0,0,0,0.1); padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        #searchBox { border: 1px solid #475569; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h2>সামির হোসেন</h2>
        <input type="email" id="email" placeholder="ইমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button onclick="auth('login')">লগইন</button>
        <button onclick="auth('register')">নতুন একাউন্ট</button>
        <button onclick="googleLogin()" style="background: #db4437;">Google দিয়ে লগইন</button>
        <button onclick="forgot()" style="background:none; border:1px solid #6366f1">পাসওয়ার্ড ভুলে গেছেন?</button>
    </div>

    <div class="box hidden" id="dashBox">
        <h2 id="welcomeText">ড্যাশবোর্ড</h2>
        <button onclick="toggleTheme()" style="padding: 5px; width: auto;">থিম পরিবর্তন</button>
        <input type="file" id="fileInput">
        <select id="category"><option value="image">ছবি</option><option value="video">ভিডিও</option><option value="audio">অডিও</option></select>
        <button onclick="uploadFile()">আপলোড ফাইল</button>
        <input type="text" id="searchBox" placeholder="🔍 সার্চ করুন..." onkeyup="filterFiles()">
        <ul id="files"></ul>
        
        <div style="margin-top: 20px; border-top: 1px solid #475569; padding-top: 20px; text-align: left;">
            <h3 style="text-align: center;">সাপোর্ট সেন্টার</h3>
            <textarea id="supportMsg" placeholder="আপনার সমস্যাটি এখানে লিখুন..." style="height:80px;"></textarea>
            <button onclick="sendSupport()" style="background:#4f46e5;">মেসেজ পাঠান</button>
        </div>

        <button onclick="logout()" style="background: #ef4444; margin-top: 15px;">লগআউট</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBleLrL4M-PuXieI_sYwjORch0Ni_Gc4g8", authDomain: "samir-login.firebaseapp.com", projectId: "samir-login", storageBucket: "samir-login.firebasestorage.app", messagingSenderId: "684678891663", appId: "1:684678891663:web:d1cc4ca1b95036b6ffc8fa" };
        firebase.initializeApp(firebaseConfig);

        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                document.getElementById('email').value = result.user.email;
                showDashboard(result.user.email);
            }).catch(e => alert(e.message));
        }

        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("ইমেইল ও পাসওয়ার্ড দিন");
            try {
                if(type === 'register') await firebase.auth().createUserWithEmailAndPassword(email, password);
                else await firebase.auth().signInWithEmailAndPassword(email, password);
                showDashboard(email);
            } catch(e) { alert(e.message); }
        }

        function showDashboard(email) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('dashBox').classList.remove('hidden');
            document.getElementById('welcomeText').innerText = "স্বাগতম, " + email;
            loadFiles();
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const email = document.getElementById('email').value;
            if(!file) return alert("ফাইল সিলেক্ট করুন");
            const formData = new FormData();
            formData.append('file', file);
            formData.append('email', email);
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message);
            loadFiles();
        }

        async function loadFiles() {
            const email = document.getElementById('email').value;
            const res = await fetch('/api/files', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email}) });
            const data = await res.json();
            const list = document.getElementById('files');
            list.innerHTML = "";
            if(data.files) {
                data.files.forEach(f => {
                    list.innerHTML += `<li>${f.filename} 
                        <div>
                            <button onclick="window.open('/api/download/${encodeURIComponent(f.filename)}')" style="padding:5px; background:green">📥</button>
                            <button onclick="deleteFile('${encodeURIComponent(f.filename)}')" style="padding:5px; background:red">❌</button>
                        </div>
                    </li>`;
                });
            }
        }

        async function deleteFile(encodedFilename) {
            if(!confirm("মুছে ফেলতে চান?")) return;
            const res = await fetch(`/api/delete/${encodedFilename}`, { method: 'DELETE' });
            const data = await res.json();
            alert(data.message);
            loadFiles();
        }

        async function sendSupport() {
            const email = document.getElementById('email').value;
            const msg = document.getElementById('supportMsg').value;
            if(!msg) return alert("দয়া করে সমস্যাটি লিখুন!");
            await fetch('/api/support', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ email, message: `সাপোর্ট: ${msg}` }) 
            });
            alert("মেসেজ পাঠানো হয়েছে!");
        }

        function filterFiles() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('#files li').forEach(li => li.style.display = li.textContent.toLowerCase().includes(q) ? "" : "none");
        }

        function logout() { location.reload(); }
        async function forgot() {
            const email = document.getElementById('email').value;
            if(!email) return alert("ইমেইল লিখুন");
            try {
                await firebase.auth().sendPasswordResetEmail(email);
                alert("রিসেট লিংক পাঠানো হয়েছে!");
            } catch(e) { alert(e.message); }
        }
    </script>
</body>
</html>
