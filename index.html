<script>
    let mode = 'login';
    function setMode(m) {
        mode = m;
        document.getElementById('form-title').innerText = (m === 'signup') ? "নতুন অ্যাকাউন্ট তৈরি" : (m === 'forgot') ? "পাসওয়ার্ড রিসেট" : "লগইন করুন";
        document.getElementById('main-btn').innerText = (m === 'signup') ? "রেজিস্ট্রেশন করুন" : (m === 'forgot') ? "রিসেট লিংক পাঠান" : "লগইন";
        document.getElementById('username').style.display = (m === 'signup') ? "block" : "none";
    }

    async function processAuth() {
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (mode === 'signup' && password.length < 6) {
            alert("পাসওয়ার্ড অন্তত ৬ অক্ষরের হতে হবে!");
            return;
        }

        const endpoint = (mode === 'signup') ? '/api/register' : '/api/login';
        
        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();
            if (response.ok) {
                alert(data.message);
                if (mode === 'login') {
                    document.getElementById('auth-form').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                }
            } else {
                alert(data.error || "অপারেশন ব্যর্থ হয়েছে!");
            }
        } catch (err) {
            alert("সার্ভারে কানেক্ট করা যাচ্ছে না!");
        }
    }

    // আপডেট করা বাটন ফাংশন
    async function apiAction(path) {
        if(path === '/api/upload') {
            // ফাইল আপলোডের জন্য সরাসরি ইনপুট বক্স
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const file = e.target.files[0];
                alert("ফাইলটি সার্ভারে পাঠানো হচ্ছে: " + file.name);
                // এখানে পরবর্তীতে ফাইল আপলোডের ব্যাকএন্ড কোড বসবে
            };
            input.click();
        } else {
            try {
                const response = await fetch(path, { method: 'GET' });
                const data = await response.json();
                alert(data.message);
            } catch (err) {
                alert("সার্ভারে সংযোগ বিচ্ছিন্ন!");
            }
        }
    }
</script>
