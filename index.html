<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন - আলটিমেট মিডিয়া পোর্টাল</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .wrapper { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        .link { font-size: 13px; color: #94a3b8; cursor: pointer; margin-top: 15px; display: inline-block; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .grid-btn { background: #334155; border: 1px solid #475569; padding: 10px; font-size: 12px; border-radius: 6px; color: white; cursor: pointer; }
        .file-list { margin-top: 20px; text-align: left; }
        .file-item { background: #0f172a; padding: 10px; margin-top: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    </style>
</head>
<body>
<div class="wrapper">
    <h2 id="form-title">লগইন করুন</h2>
    
    <div id="auth-form">
        <input type="text" id="username" placeholder="আপনার নাম" style="display: none;">
        <input type="email" id="email" placeholder="আপনার জিমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button id="main-btn" onclick="processAuth()">লগইন</button>
        <div id="options">
            <span class="link" onclick="setMode('signup')">নতুন অ্যাকাউন্ট খুলুন</span> | 
            <span class="link" onclick="setMode('forgot')">পাসওয়ার্ড ভুলে গেছেন?</span>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <h3>স্বাগতম, সামির হোসেন!</h3>
        <p>মোট ফাইল: <span id="file-count">0</span></p>
        
        <div id="btn-container" class="grid-container">
            <button class="grid-btn" onclick="apiAction('media')">১. মিডিয়া ম্যানেজার</button>
            <button class="grid-btn" onclick="apiAction('upload')">২. ফাইল আপলোড</button>
            <button class="grid-btn" onclick="apiAction('profile')">৩. প্রোফাইল</button>
            <button class="grid-btn" onclick="apiAction('db')">৪. ডাটাবেজ</button>
            <button class="grid-btn" onclick="apiAction('settings')">৫. সেটিংস</button>
            <button class="grid-btn" onclick="location.reload()" style="background: #ef4444;">৬. লগ আউট</button>
        </div>
        
        <div id="content-display" style="margin-top:20px;"></div>
        <div id="file-list" class="file-list"></div>
    </div>
</div>

<script>
    let mode = 'login';
    let fileCount = 0;

    function setMode(m) {
        mode = m;
        document.getElementById('form-title').innerText = (m === 'signup') ? "নতুন অ্যাকাউন্ট তৈরি" : (m === 'forgot') ? "পাসওয়ার্ড রিসেট" : "লগইন করুন";
        document.getElementById('main-btn').innerText = (m === 'signup') ? "রেজিস্ট্রেশন করুন" : (m === 'forgot') ? "রিসেট লিংক পাঠান" : "লগইন";
        document.getElementById('username').style.display = (m === 'signup') ? "block" : "none";
    }

    async function processAuth() {
        document.getElementById('auth-form').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
    }

    function apiAction(action) {
        const display = document.getElementById('content-display');
        const btnContainer = document.getElementById('btn-container');

        if (action === 'upload') {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    fileCount++;
                    document.getElementById('file-count').innerText = fileCount;
                    const list = document.getElementById('file-list');
                    list.innerHTML += `
                        <div class="file-item">
                            <span>${file.name.substring(0, 15)}...</span>
                            <button onclick="alert('ডাউনলোড হচ্ছে: ${file.name}')">ডাউনলোড</button>
                        </div>`;
                }
            };
            input.click();
            return;
        }

        const contentMap = {
            'media': '<h3>মিডিয়া ম্যানেজার</h3><p>এখানে আপনার আপলোড করা ফাইলগুলো থাকবে।</p>',
            'profile': '<h3>প্রোফাইল</h3><p>সামির হোসেন (অ্যাডমিন)</p>',
            'db': '<h3>ডাটাবেজ</h3><p>কানেকশন স্ট্যাটাস: অনলাইন</p>',
            'settings': '<h3>সেটিংস</h3><p>পোর্টাল কনফিগারেশন প্যানেল।</p>'
        };

        if (contentMap[action]) {
            btnContainer.style.display = 'none';
            display.innerHTML = `
                ${contentMap[action]}
                <button onclick="document.getElementById('btn-container').style.display='grid'; document.getElementById('content-display').innerHTML='';" style="background: #6366f1;">ফিরে যান</button>
            `;
        }
    }
</script>
</body>
</html>
