<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন - আলটিমেট মিডিয়া পোর্টাল</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .wrapper { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        .link { font-size: 13px; color: #94a3b8; cursor: pointer; margin-top: 15px; display: inline-block; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .grid-btn { background: #334155; border: 1px solid #475569; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
<div class="wrapper">
    <h2 id="form-title">লগইন করুন</h2>
    
    <div id="auth-form">
        <input type="text" id="username" placeholder="আপনার নাম" style="display: none;">
        <input type="email" id="email" placeholder="আপনার জিমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button id="main-btn" onclick="processAuth()">লগইন</button>
        
        <div id="options">
            <span class="link" onclick="setMode('signup')">নতুন অ্যাকাউন্ট খুলুন</span> | 
            <span class="link" onclick="setMode('forgot')">পাসওয়ার্ড ভুলে গেছেন?</span>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <h3>স্বাগতম, সামির হোসেন!</h3>
        <p>আপনার ড্যাশবোর্ড অপশনসমূহ:</p>
        
        <div class="grid-container">
            <button class="grid-btn" onclick="alert('মিডিয়া ম্যানেজার ওপেন...')">১. মিডিয়া ম্যানেজার</button>
            <button class="grid-btn" onclick="alert('ফাইল আপলোড ওপেন...')">২. ফাইল আপলোড</button>
            <button class="grid-btn" onclick="alert('আপনার প্রোফাইল...')">৩. প্রোফাইল</button>
            <button class="grid-btn" onclick="alert('ডাটাবেজ স্ট্যাটাস...')">৪. ডাটাবেজ</button>
            <button class="grid-btn" onclick="alert('সিকিউরিটি সেটিংস...')">৫. সেটিংস</button>
            <button class="grid-btn" onclick="location.reload()" style="background: #ef4444;">৬. লগ আউট</button>
        </div>
    </div>
</div>

<script>
    let mode = 'login';
    function setMode(m) {
        mode = m;
        document.getElementById('form-title').innerText = (m === 'signup') ? "নতুন অ্যাকাউন্ট তৈরি" : (m === 'forgot') ? "পাসওয়ার্ড রিসেট" : "লগইন করুন";
        document.getElementById('main-btn').innerText = (m === 'signup') ? "রেজিস্ট্রেশন করুন" : (m === 'forgot') ? "রিসেট লিংক পাঠান" : "লগইন";
        document.getElementById('username').style.display = (m === 'signup') ? "block" : "none";
    }

    async function processAuth() {
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (mode === 'signup' && password.length < 6) {
            alert("পাসওয়ার্ড অন্তত ৬ অক্ষরের হতে হবে!");
            return;
        }

        const endpoint = (mode === 'signup') ? '/api/register' : '/api/login';
        
        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();
            if (response.ok) {
                alert(data.message);
                if (mode === 'login') {
                    document.getElementById('auth-form').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                }
            } else {
                alert(data.error || "অপারেশন ব্যর্থ হয়েছে!");
            }
        } catch (err) {
            alert("সার্ভারে কানেক্ট করা যাচ্ছে না!");
        }
    }
</script>
</body>
</html>
