<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সামির হোসেন পোর্টাল</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; }
        .light-mode { --bg: #f8fafc; --card: #ffffff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; transition: 0.3s; }
        .box { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; }
        button { background: var(--accent); color: white; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .hidden { display: none; }
        ul { text-align: left; margin-top: 10px; list-style: none; }
        li { background: rgba(0,0,0,0.1); padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; }
        #searchBox { border: 1px solid #475569; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h2>সামির হোসেন</h2>
        <input type="email" id="email" placeholder="ইমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button onclick="auth('login')">লগইন</button>
        <button onclick="auth('register')">নতুন একাউন্ট</button>
        <button onclick="forgot()" style="background:none; border:1px solid #6366f1">পাসওয়ার্ড ভুলে গেছেন?</button>
    </div>

    <div class="box hidden" id="dashBox">
        <h2 id="welcomeText">ড্যাশবোর্ড</h2>
        <button onclick="toggleTheme()" style="padding: 5px; width: auto;">থিম পরিবর্তন</button>
        
        <input type="file" id="fileInput">
        <select id="category">
            <option value="image">ছবি</option>
            <option value="video">ভিডিও</option>
            <option value="audio">অডিও</option>
        </select>
        <button onclick="uploadFile()">আপলোড ফাইল</button>

        <div id="fileList" style="margin-top: 20px;">
            <input type="text" id="searchBox" placeholder="🔍 ফাইল সার্চ করুন..." onkeyup="filterFiles()">
            <ul id="files"></ul>
        </div>

        <hr style="margin: 20px 0;">
        <input type="password" id="oldPass" placeholder="পুরানো পাসওয়ার্ড">
        <input type="password" id="newPass" placeholder="নতুন পাসওয়ার্ড">
        <button onclick="changePass()" style="background: #ef4444;">পাসওয়ার্ড পরিবর্তন</button>
        <button onclick="location.reload()" style="background: #475569;">লগআউট</button>
    </div>

    <script>
        // নোটিফিকেশন ফাংশন
        function notify(msg) { alert(msg); }

        // থিম টগল
        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        // সার্চ ফাংশন
        function filterFiles() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            const list = document.getElementById('files').getElementsByTagName('li');
            for(let l of list) l.style.display = l.textContent.toLowerCase().includes(q) ? "" : "none";
        }

        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return notify("দয়া করে ইমেইল ও পাসওয়ার্ড দিন");
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password, type}) });
            const data = await res.json();
            notify(data.message || data.error);
            if(data.success) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('dashBox').classList.remove('hidden');
                document.getElementById('welcomeText').innerText = "স্বাগতম, " + email;
                loadFiles();
            }
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const category = document.getElementById('category').value;
            const email = document.getElementById('email').value;
            if(!file) return notify("দয়া করে ফাইল সিলেক্ট করুন");
            const formData = new FormData();
            formData.append('file', file);
            formData.append('category', category);
            formData.append('email', email);
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            notify(data.message);
            document.getElementById('fileInput').value = "";
            loadFiles();
        }

        async function loadFiles() {
            const email = document.getElementById('email').value;
            const res = await fetch('/api/files', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email}) });
            const data = await res.json();
            const list = document.getElementById('files');
            list.innerHTML = "";
            if(data.files && data.files.length > 0) {
                data.files.forEach(f => {
                    list.innerHTML += `<li>${f.filename} <a href="/api/download/${f.filename}">📥</a></li>`;
                });
            } else {
                list.innerHTML = "<li>কোন ফাইল নেই</li>";
            }
        }

        async function changePass() {
            const email = document.getElementById('email').value;
            const oldPassword = document.getElementById('oldPass').value;
            const newPassword = document.getElementById('newPass').value;
            const res = await fetch('/api/change-password', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, oldPassword, newPassword}) });
            const data = await res.json();
            notify(data.message || data.error);
        }

        async function forgot() {
            const email = document.getElementById('email').value;
            const res = await fetch('/api/forgot', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email}) });
            const data = await res.json();
            notify(data.message || data.error);
        }
    </script>
</body>
</html>
